name: Build and Release Logseq Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_NAME: ${{ github.event.repository.name }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Package plugin zip
        run: |
          mkdir "$PLUGIN_NAME"
          cp README.md LICENSE package.json icon.svg "$PLUGIN_NAME"
          cp -R dist "$PLUGIN_NAME"
          zip -r "$PLUGIN_NAME.zip" "$PLUGIN_NAME"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-zip
          path: ${{ env.PLUGIN_NAME }}.zip

      - name: Create GitHub release and upload zip
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.PLUGIN_NAME }}.zip
